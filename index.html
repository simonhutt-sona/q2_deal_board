// Hide deals whose owner ID couldn't be resolved to a name (shown as "Owner {id}")
const DEALS = RAW_DEALS.filter(d => !/^Owner \d+$/.test(d.owner));
const PAL=['#7c3aed','#2563eb','#059669','#d97706','#dc2626','#0891b2','#9333ea','#16a34a','#ea580c','#be185d','#4f46e5','#0d9488'];
const AC={};
function avatar(n){ if(!AC[n]){const i=Object.keys(AC).length%PAL.length; AC[n]={ini:n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join(''),c:PAL[i]};} return AC[n]; }
function fmtUSD(v){ if(!v&&v!==0)return'—'; if(v>=1e6)return'$'+(v/1e6).toFixed(2).replace(/\.?0+$/,'')+'M'; if(v>=1000)return'$'+Math.round(v).toLocaleString('en-US'); return'$'+Math.round(v); }
function fmtNum(v){ return (v||v===0)?Number(v).toLocaleString('en-US'):'—'; }
function fmtDate(d){ if(!d)return'—'; return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function cards(){
  const open=DEALS.filter(d=>!d.is_won);
  const g={In:open.filter(d=>d.in_out==='In'),Out:open.filter(d=>d.in_out==='Out'),blank:open.filter(d=>!d.in_out),won:DEALS.filter(d=>d.is_won)};
  const sum=a=>a.reduce((s,d)=>s+d.amount_usd,0);
  function card(k,l,a){ return `<div class="summary-card ${activeFilter===k?'active':''}" onclick="setFilter('${k}')"><div class="card-label">${l}</div><div><span class="card-amount">${fmtUSD(sum(a))}</span><span class="card-count">(${a.length})</span></div></div>`; }
  document.getElementById('summaryCards').innerHTML =
    `<div class="summary-card ${activeFilter==='all'?'active':''}" onclick="setFilter('all')"><div class="card-label">Open Pipeline</div><div><span class="card-amount">${fmtUSD(sum(open))}</span><span class="card-count">(${open.length})</span></div></div>`
    + card('In','In',g.In)+card('Out','Out',g.Out)+card('blank','Not Set',g.blank)+card('won','Won',g.won);
}

function render(){
  const showIO = activeFilter!=='won';
  let rows=[...DEALS];
  if(activeFilter==='all') rows=rows.filter(d=>!d.is_won);
  else if(activeFilter==='won') rows=rows.filter(d=>d.is_won);
  else rows=rows.filter(d=> !d.is_won && (activeFilter==='blank'?!d.in_out:d.in_out===activeFilter));
  if(searchTerm){ const q=searchTerm.toLowerCase(); rows=rows.filter(d=>[d.name,d.company,d.owner,d.stage,d.forecast,(d.modules||[]).join(' ')].some(x=>(x||'').toLowerCase().includes(q))); }
  rows.sort((a,b)=>{ let av=a[sortKey],bv=b[sortKey]; if(sortKey==='amount_usd'||sortKey==='employees'){av=av||0;bv=bv||0;} else {av=av||'';bv=bv||'';} return (av<bv?-1:av>bv?1:0)*(sortAsc?1:-1); });
  document.getElementById('dealCount').textContent = rows.length+' deal'+(rows.length!==1?'s':'');
  if(!rows.length){ document.getElementById('tableWrap').innerHTML='<div class="empty">No deals match.</div>'; return; }

  const cols=[['name','Name'],['amount_usd','Amount (USD)'],['owner','Owner']];
  if(showIO) cols.push(['in_out','In / Out']);
  cols.push(['forecast','Forecast'],['stage','Stage'],['employees','Employees'],['modules','Modules'],['kickoff','Likely Kick-off'],['close_date','Close Date']);
  const thead='<thead><tr>'+cols.map(([k,l])=>`<th class="${sortKey===k?'sorted':''}" onclick="toggleSort('${k}')">${l} <span class="sort-icon">${sortKey===k?(sortAsc?'↑':'↓'):'↕'}</span></th>`).join('')+'</tr></thead>';
  const tbody='<tbody>'+rows.map(d=>{
    const a=avatar(d.owner);
    const io = d.in_out==='In'?'<span class="badge in">In</span>':d.in_out==='Out'?'<span class="badge out">Out</span>':'<span class="badge blank">Not set</span>';
    const mods=(d.modules&&d.modules.length)?`<div class="mod-chips">${d.modules.map(m=>`<span class="mod">${esc(m)}</span>`).join('')}</div>`:'—';
    return `<tr>
      <td><div class="deal-name">${esc(d.name)}</div>${d.company?`<div class="deal-company">${esc(d.company)}</div>`:''}</td>
      <td><span class="amount">${fmtUSD(d.amount_usd)}</span></td>
      <td><div class="owner-cell"><div class="avatar" style="background:${a.c}">${a.ini}</div><span>${esc(d.owner)}</span></div></td>
      ${showIO?`<td>${io}</td>`:''}
      <td><span class="forecast-tag">${esc(d.forecast||'—')}</span></td>
      <td><span class="stage-pill ${d.is_won?'won':''}">${esc(d.stage)}</span></td>
      <td class="num">${fmtNum(d.employees)}</td>
      <td>${mods}</td>
      <td class="date-cell">${fmtDate(d.kickoff)}</td>
      <td class="date-cell">${fmtDate(d.close_date)}</td>
    </tr>`;
  }).join('')+'</tbody>';
  document.getElementById('tableWrap').innerHTML='<table>'+thead+tbody+'</table><div class="table-footer"><span>'+rows.length+' of '+DEALS.length+' deals</span><span>Data as of 2 Jul 2026</span></div>';
}

function toggleSort(k){ if(sortKey===k)sortAsc=!sortAsc; else{sortKey=k;sortAsc=(k==='close_date');} render(); }
function setFilter(f){ activeFilter=f; document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.chip===f)); cards(); render(); }
function applyFilters(){ searchTerm=document.getElementById('searchInput').value.trim(); render(); }
function exportCSV(){
  const ks=['name','company','amount_usd','owner','in_out','forecast','stage','employees','modules','kickoff','close_date'];
  const hs=['Deal Name','Company','Amount USD','Owner','In/Out','Forecast Category','Stage','Employees','Modules','Likely Kick-off','Close Date'];
  const rows=DEALS.map(d=>ks.map(k=>{let v=d[k]; if(k==='modules')v=(d.modules||[]).join('; '); return '"'+String(v??'').replace(/"/g,'""')+'"';}).join(','));
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([[hs.join(','),...rows].join('\n')],{type:'text/csv'})),download:'q2-fy26-deals.csv'});
  a.click();
}
document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.chip==='In'));
cards(); render();
</script>
</body>
</html>
